<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>У Нас Чисто</title>
    
    <!-- PWA Meta -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#FF8C00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="УНЧ">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/css/styles.css">
    
    <!-- Telegram WebApp (опционально) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app">
        <!-- Экран загрузки -->
        <div id="splash-screen" class="splash-screen">
            <div class="splash-content">
                <div class="logo">🚮</div>
                <h1>У Нас Чисто</h1>
                <div class="spinner"></div>
            </div>
        </div>
        
        <!-- Основной контент -->
        <div id="app-content" style="display: none;">
            <!-- Шапка -->
            <header class="header">
                <div class="header-left">
                    <button class="menu-btn" id="menuToggle">☰</button>
                </div>
                <div class="header-title" id="headerTitle">Главная</div>
                <div class="header-right">
                    <span class="bonus-badge" id="bonusBadge">0💎</span>
                </div>
            </header>
            
            <!-- Боковое меню -->
            <nav class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <div class="user-avatar" id="userAvatar">👤</div>
                    <div class="user-info">
                        <div class="user-name" id="userName">Гость</div>
                        <div class="user-id" id="userId">ID: ---</div>
                    </div>
                </div>
                <ul class="sidebar-menu">
                    <li data-page="main"><span>🏠</span> Главная</li>
                    <li data-page="orders"><span>📋</span> Мои заказы</li>
                    <li data-page="reviews"><span>⭐</span> Отзывы</li>
                    <li data-page="bonuses"><span>💎</span> Мои бонусы</li>
                    <li data-page="profile"><span>👤</span> Профиль</li>
                    <li class="admin-only" data-page="admin" style="display: none;"><span>🔧</span> Админ-панель</li>
                    <li class="divider"></li>
                    <li id="logoutBtn"><span>🚪</span> Выйти</li>
                </ul>
            </nav>
            
            <!-- Оверлей для меню -->
            <div class="sidebar-overlay" id="sidebarOverlay"></div>
            
            <!-- Основная область -->
            <main class="main-content" id="mainContent">
                <!-- Контент будет загружаться динамически -->
                <div class="loading">Загрузка...</div>
            </main>
            
            <!-- Нижняя навигация (для мобильных) -->
            <nav class="bottom-nav">
                <button class="nav-item active" data-page="main">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-label">Главная</span>
                </button>
                <button class="nav-item" data-page="orders">
                    <span class="nav-icon">📋</span>
                    <span class="nav-label">Заказы</span>
                </button>
                <button class="nav-item" data-page="reviews">
                    <span class="nav-icon">⭐</span>
                    <span class="nav-label">Отзывы</span>
                </button>
                <button class="nav-item" data-page="profile">
                    <span class="nav-icon">👤</span>
                    <span class="nav-label">Профиль</span>
                </button>
            </nav>
        </div>
    </div>
    
    <!-- Модальные окна -->
    <div id="modalContainer" class="modal-container"></div>
    
    <!-- Уведомления -->
    <div id="toastContainer" class="toast-container"></div>
    
    <!-- Скрипты -->
    <script src="/js/config.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>  <!-- auth.js ДОЛЖЕН БЫТЬ ДО app.js -->
    <script src="/js/app.js"></script>
    <script src="/js/orders.js"></script>
    <script src="/js/reviews.js"></script>
    <script src="/js/bonuses.js"></script>
    <script src="/js/profile.js"></script>
    <script src="/js/admin.js"></script>
</body>
</html>
